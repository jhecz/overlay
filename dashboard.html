<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JHECZ Dashboard</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial,sans-serif;
}

h1{
  text-align:center;
  color:#ff0000;
  margin:30px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#151515;
  border:2px solid #ff0000;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(255,0,0,.3);
}

.title{
  font-size:18px;
  color:#aaa;
}

.value{
  font-size:42px;
  font-weight:bold;
  margin-top:10px;
}

.list{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🎥 JHECZ STREAM DASHBOARD</h1>

<div class="grid">

  <div class="card">
    <div class="title">Total Donations</div>
    <div class="value" id="totalDonations">0</div>
  </div>

  <div class="card">
    <div class="title">Total Raised</div>
    <div class="value" id="totalRaised">£0.00</div>
  </div>

  <div class="card">
    <div class="title">Red Stripe Count</div>
    <div class="value" id="redStripe">0</div>
  </div>

  <div class="card">
    <div class="title">Big Ballers</div>
    <div class="value" id="bigBallers">0</div>
  </div>

  <div class="card">
    <div class="title">Recent Supporters</div>
    <div class="list" id="recentSupporters">
      Loading...
    </div>
  </div>

</div>

</body>
</html>

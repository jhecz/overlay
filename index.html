<script>
  const alertBox = document.getElementById("alert");
  let lastSeenId = localStorage.getItem("lastAlertId");

  const optionMessages = {
    anything: { emoji: "💸", text: "Thanks for supporting the stream!" },
    redstripe: { emoji: "🍺", text: "Mans now buying some Red Stripe, thank you!" },
    equipment: { emoji: "🎥", text: "Thank you for helping upgrade the setup g!" },
    giveaways: { emoji: "🎁", text: "This is going towards giveaways!" },
    charity: { emoji: "❤️", text: "This is going to the charity pot!" }
  };

  const sounds = {
    anything: new Audio("/sounds/anything.mp3"),
    redstripe: new Audio("/sounds/beer.mp3"),
    equipment: new Audio("/sounds/equipment.mp3"),
    giveaways: new Audio("/sounds/giveaway.mp3"),
    charity: new Audio("/sounds/charity.mp3"),
    bigballer: new Audio("/sounds/bigballer.mp3"),
    ultraballer: new Audio("/sounds/ultraballer.mp3")
  };

  Object.values(sounds).forEach(sound => {
    sound.preload = "auto";
    sound.volume = 1;
  });

  async function unlockAudio() {
    try {
      const silent = new Audio(
        "data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAACAAACcQCA"
      );

      silent.volume = 0;
      await silent.play();
      silent.pause();

      console.log("Audio unlocked");
    } catch (err) {
      console.log("Audio unlock failed:", err);
    }
  }

  unlockAudio();

  function playSound(option, amount) {
    let sound = sounds[option] || sounds.anything;

    if (amount >= 50) {
      sound = sounds.ultraballer;
    } else if (amount >= 20) {
      sound = sounds.bigballer;
    }

    sound.pause();
    sound.currentTime = 0;

    sound.play()
      .then(() => console.log("Playing:", sound.src))
      .catch(err => console.error("Sound error:", err));
  }

  function showAlert(data) {
    const option = data.option || "anything";
    const selected = optionMessages[option] || optionMessages.anything;
    const amount = Number(data.amount || 0);

    playSound(option, amount);

    document.getElementById("emoji").textContent = selected.emoji;
    document.getElementById("name").textContent =
      data.name || "Anonymous Supporter";

    document.getElementById("amount").textContent =
      `${amount.toFixed(2)} ${data.currency || "GBP"}`;

    document.getElementById("message").textContent =
      selected.text;

    const baller = document.getElementById("baller");

    if (amount >= 50) {
      baller.textContent = "👑 ULTRA BIG BALLER ALERT!";
    } else if (amount >= 20) {
      baller.textContent = "🏆 BIG BALLER STATUS UNLOCKED!";
    } else {
      baller.textContent = "";
    }

    alertBox.classList.add("show");

    setTimeout(() => {
      alertBox.classList.remove("show");
    }, 10000);
  }

  async function checkAlert() {
    try {
      const res = await fetch("/api/alert");
      const data = await res.json();

      if (data.id && data.id !== lastSeenId) {
        lastSeenId = data.id;
        localStorage.setItem("lastAlertId", data.id);
        showAlert(data);
      }
    } catch (err) {
      console.error("Alert check failed", err);
    }
  }

  setInterval(checkAlert, 1000);
